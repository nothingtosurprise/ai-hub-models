##
## QAI Hub Models LLM Performance Collection
##
## Collects TPS (tokens per second) and TTFT (time to first token) metrics
## for LLM models across specified devices using QDC (Qualcomm Device Cloud).
##
## Pre-compiled genie bundles are fetched from each model's release-assets.yaml
## (no compilation runs in this workflow); the context length is baked into the
## published assets. Models without an entry in release-assets.yaml will fail.
##

name: LLM Performance Collection
run-name: "LLM Perf (${{ inputs.model || 'all' }}, ${{ inputs.device || 'Snapdragon X Elite CRD,Snapdragon X2 Elite CRD,Snapdragon 8 Elite QRD,Snapdragon 8 Elite Gen 5 QRD' }})"

env:
  VENV_PATH: build/ci-envs/qaihm-build
  QAIHM_CI: 1

on:
  # Allows this workflow to be manually triggered.
  workflow_dispatch:
    inputs:
      model:
        description: 'LLM Model(s) to test. Comma-separated for multiple, or "all" for all LLMs.'
        required: true
        default: 'all'
        type: string

      device:
        description: 'Target device(s). See `src/qai_hub_models/scorecard/device.py`. Comma-separated for multiple (e.g., "cs_x2_elite,cs_auto_lemans_8775")'
        required: true
        default: cs_x2_elite
        type: string

      deployment:
        description: 'Hub Deployment'
        default: prod
        type: choice
        options:
          - prod
          - staging
          - dev

      run_eval:
        description: 'Run on-device evaluation with default prompts. To use custom prompts, run locally via CLI: python -m qai_hub_models.utils.qdc.genie_jobs --eval-prompts <path-to-json>'
        default: true
        type: boolean

      create_pr:
        description: 'Create PR with perf.yaml changes'
        default: true
        type: boolean


defaults:
  run:
    shell: bash

jobs:
  setup_docker_gpu:
    name: "Setup GPU Docker Image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        lfs: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # DockerHub login to avoid rate limits when pulling nvidia/cuda base image
    - name: Log in to Docker Hub
      uses: docker/login-action@v4
      with:
        username: shreyajn104
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Get tag
      id: tag
      run: |
        echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: docker/Dockerfile
        push: true
        tags: ghcr.io/${{ github.repository }}/gpu_builder:${{ steps.tag.outputs.image_tag }}
        cache-from: type=gha,scope=gpu_builder
        cache-to: type=gha,scope=gpu_builder,mode=max
        build-args: |
          QAIHM_CI=${{ env.QAIHM_CI }}

  collect_llm_perf:
    name: "Collect LLM Performance Numbers"
    needs: setup_docker_gpu
    runs-on:
      group: GPU
    timeout-minutes: 2880 # 2 days for multiple models/devices
    container:
      image: ghcr.io/${{ github.repository }}/gpu_builder:${{ needs.setup_docker_gpu.outputs.image_tag }}
      options: --gpus all -v /local:/local
    permissions:
      contents: write
      actions: read
      id-token: write
      packages: read
      pull-requests: write
    env:
      HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
      QDC_API_TOKEN: ${{ secrets.QDC_API_KEY }}
      QAIHM_JUNIT_XML_PATH: ${{ github.workspace }}/test-results/models-junit.xml
      CUDA_VISIBLE_DEVICES: "7"
      DOCKER_USER: qaihm_bot
      DOCKER_GROUP: qaihm_bot_group
      DOCKER_USER_ID: 4552456
      DOCKER_GROUP_ID: 200
      HOME: /local/mnt2/workspace2/qaihm_bot
      TMPDIR: /local/mnt2/workspace2/qaihm_bot/tmp
    outputs:
      branch_name: ${{ steps.push_changes.outputs.branch_name }}
      has_changes: ${{ steps.check_changes.outputs.has_changes }}

    steps:
    - name: Setup group/user and TMPDIR
      run: |
        groupadd -g ${{ env.DOCKER_GROUP_ID }} ${{ env.DOCKER_GROUP }} || true
        useradd -m -u ${{ env.DOCKER_USER_ID }} -g ${{ env.DOCKER_GROUP_ID }} -d /home/${{ env.DOCKER_USER }} -s /bin/bash ${{ env.DOCKER_USER }} || true
        mkdir -p "$TMPDIR"
        chown ${{ env.DOCKER_USER_ID }}:${{ env.DOCKER_GROUP_ID }} "$TMPDIR"

    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: CI Setup
      uses: ./.github/actions/ci-setup
      with:
        python-version: USE_EXISTING_INSTALL
        venv-path: ${{ env.VENV_PATH }}
        aws-role-arn: ${{ secrets.QAIHM_CI_AWS_ROLE_ARN }}
        hub-deployments: ${{ inputs.deployment || 'prod' }}
        hub-user-token-prod: ${{ secrets.HUB_USER_TOKEN_PROD }}
        hub-user-token-staging: ${{ secrets.HUB_USER_TOKEN_STAGING }}
        hub-user-token-dev: ${{ secrets.HUB_USER_TOKEN_DEV }}
        hub-user-token-sandbox: ${{ secrets.HUB_USER_TOKEN_SANDBOX }}

    - name: Download QDC tools
      run: |
        python3 scripts/build_and_test.py \
          --venv="${{ env.VENV_PATH }}" \
          --python="$(which python3)" \
          download_qdc_wheel --only
        python3 scripts/build_and_test.py \
          --venv="${{ env.VENV_PATH }}" \
          download_qairt_auto_sdk --only
        mv "$HOME"/qairt_auto_sdk.zip "$GITHUB_WORKSPACE"/

    - name: Install QDC
      run: |
        git config --global --add safe.directory $GITHUB_WORKSPACE
        source ${{ env.VENV_PATH }}/bin/activate
        pip install qualcomm_device_cloud_sdk-*.whl

    - name: Run LLM Performance Collection
      id: run_tests
      env:
        QAIHM_LLM_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ inputs.device || 'Snapdragon X Elite CRD,Snapdragon X2 Elite CRD,Snapdragon 8 Elite QRD,Snapdragon 8 Elite Gen 5 QRD' }}
        QAIRT_SDK_PATH: ${{ github.workspace }}/qairt_auto_sdk.zip
        QAIHM_RUN_EVAL: ${{ inputs.run_eval }}
      run: |
        cd $GITHUB_WORKSPACE && \
          python scripts/build_and_test.py \
            --venv='${{ env.VENV_PATH }}' \
            --only \
            collect_llm_perf

    - name: Generate Test Failure Summary
      if: ${{ !cancelled() }}
      run: |
        source "${{ env.VENV_PATH }}/bin/activate"
        pip install -q six
        python3 scripts/build_and_test.py --venv="${{ env.VENV_PATH }}" generate_test_summary

    - name: Upload Test Results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: ${{ github.workspace }}/test-results

    - name: Check for changes
      if: ${{ !cancelled() && inputs.create_pr }}
      id: check_changes
      run: |
        # Check for both modified and new/untracked perf.yaml files
        has_modified=$(git diff --quiet src/qai_hub_models/models/*/perf.yaml 2>/dev/null && echo "false" || echo "true")
        has_untracked=$(git ls-files --others --exclude-standard | grep -q 'perf\.yaml$' && echo "true" || echo "false")

        if [ "$has_modified" = "true" ] || [ "$has_untracked" = "true" ]; then
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Detected changes: modified=$has_modified, untracked=$has_untracked"
        else
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No perf.yaml changes detected"
        fi

    - name: Commit & Push Changes
      id: push_changes
      if: ${{ !cancelled() && (inputs.create_pr) && steps.check_changes.outputs.has_changes == 'true' }}
      env:
        QAIHM_TEST_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ inputs.device || 'Snapdragon X Elite CRD,Snapdragon X2 Elite CRD,Snapdragon 8 Elite QRD,Snapdragon 8 Elite Gen 5 QRD' }}
      run: |
        branch_name="perf/llm-perf-${{ github.run_id }}"
        cd $GITHUB_WORKSPACE && \
          git config --global --add safe.directory $GITHUB_WORKSPACE && \
          git config user.name 'github-actions[bot]' && \
          git config user.email 'github-actions[bot]@users.noreply.github.com' && \
          git checkout -b $branch_name && \
          git ls-files -co --exclude-standard | grep 'perf.yaml' | xargs git add && \
          git commit -m "Add LLM performance numbers

        Models: $QAIHM_TEST_MODELS
        Devices: $QAIHM_TEST_DEVICES

        Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>" && \
          git push -u origin $branch_name
        echo "branch_name=$branch_name" >> "$GITHUB_OUTPUT"

    - name: Grade LLM Responses
      id: grade_responses
      if: ${{ !cancelled() && inputs.run_eval }}
      env:
        GRADER_VENV: ${{ env.HOME }}/grader_env
        QAIHM_GRADE_RESPONSES_DIR: ${{ github.workspace }}
      run: |
        # Grader needs transformers>=5.2, which conflicts with the LLM
        # source-repo pins in the main qaihm-build venv. The grade_llm_responses
        # task installs grader deps into a dedicated --venv (via its
        # install_llm_grader_requirements dependency) and grades every
        # *_eval.json in QAIHM_GRADE_RESPONSES_DIR.
        python3 scripts/build_and_test.py \
          --venv="$GRADER_VENV" \
          grade_llm_responses

    - name: Add Grader Scores to GitHub Summary
      if: ${{ !cancelled() && inputs.run_eval && steps.grade_responses.outcome == 'success' }}
      run: |
        python3 scripts/ci/grader_summary.py "$GITHUB_WORKSPACE" >> "$GITHUB_STEP_SUMMARY"

    - name: Stage results for upload
      if: ${{ !cancelled() }}
      run: |
        # Flatten *_eval.json / *_grade.json from anywhere under the workspace
        # into a single dir so the artifact zip has a clean top-level layout
        # (no /local/mnt2/... absolute-path nesting).
        mkdir -p "$GITHUB_WORKSPACE/llm-perf-results"
        find "$GITHUB_WORKSPACE" -type f \
          \( -name '*_eval.json' -o -name '*_grade.json' \) \
          -exec cp {} "$GITHUB_WORKSPACE/llm-perf-results/" \;

    - name: Upload Results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: llm-perf-results
        path: llm-perf-results/

    - name: Add CSV to GitHub summary
      if: ${{ !cancelled() }}
      run: |
        source "${{ env.VENV_PATH }}/bin/activate"
        pip install -q pandas tabulate
        python -c 'import os, pandas as pd; print("## On-device Results"); fn="test_perf_on_device.csv"; print(pd.read_csv(fn).to_markdown(index=False)) if os.path.exists(fn) else print(f"File {fn} not found.")' >> "$GITHUB_STEP_SUMMARY"

    - name: Upload updated perf.yaml files
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v7
      with:
        name: updated-perf-yamls
        path: |
          ${{ github.workspace }}/src/qai_hub_models/models/**/perf.yaml

    - name: Create Pull Request
      if: ${{ !cancelled() && (inputs.create_pr) && steps.push_changes.outputs.branch_name != '' && steps.check_changes.outputs.has_changes == 'true' }}
      uses: actions/github-script@v9
      env:
        QAIHM_TEST_MODELS: ${{ inputs.model || 'all' }}
        QAIHM_TEST_DEVICES: ${{ inputs.device || 'Snapdragon X Elite CRD,Snapdragon X2 Elite CRD,Snapdragon 8 Elite QRD,Snapdragon 8 Elite Gen 5 QRD' }}
      with:
        github-token: ${{ secrets.STAGING_GH_TOKEN }}
        result-encoding: string
        script: |
          const { repo, owner } = context.repo;
          const models = process.env.QAIHM_TEST_MODELS;
          const devices = process.env.QAIHM_TEST_DEVICES;
          const result = await github.rest.pulls.create({
            title: `[Automated] Add LLM performance numbers`,
            owner,
            repo,
            head: '${{ steps.push_changes.outputs.branch_name }}',
            base: 'main',
            body: [
              'Generated automatically by LLM Performance Collection workflow.',
              '',
              `Models: ${models}`,
              `Devices: ${devices}`,
              '',
              'Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            ].join('\n')
          });
          console.log('PR created:', result.data.html_url);
          return result.data.html_url;

    - name: Cleanup (always runs)
      if: ${{ !cancelled() }}
      run: |
        # Cleanup temporary files
        if [ -n "$HOME" ]; then
          rm -rf "$HOME"/.aws
          rm -rf "$HOME"/model_envs
          rm -rf "$HOME"/grader_env
        fi
        rm -rf "$GITHUB_WORKSPACE"/qualcomm_device_cloud_sdk-*.whl
        rm -rf "$GITHUB_WORKSPACE"/genie_bundles/*
        rm -rf "$TMPDIR"

    - name: Fail workflow if tests failed
      if: ${{ !cancelled() && steps.run_tests.outcome != 'success' }}
      run: exit 1
