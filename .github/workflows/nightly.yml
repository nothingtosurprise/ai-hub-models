##
## QAI Hub Models Nightly Tests
##

name: QAI Hub Models Nightly

on:
    schedule:
        - cron: '0 9 * * *' # Daily at 1am PST (2am PDT)

    workflow_dispatch:
      inputs:
        models:
          description: Models to Run
          required: false
          type: string
          default: pytorch

        run_sc_integration_test:
          description: Run Scorecard Integration Test
          type: boolean
          default: true

        run_website_test:
          description: Run Website Import Test
          type: boolean
          default: true

    workflow_call:
      inputs:
        run_sc_integration_test:
          type: boolean
          default: true

        run_website_test:
          type: boolean
          default: true

jobs:
    run-tests310:
      name: Run Tests (py 3.10)
      secrets: inherit
      uses: ./.github/workflows/test.yml
      with:
        precommit_scope: "all"
        enable_compile_tests: true
        python_version: "3.10"
        models: ${{ inputs.models || 'pytorch' }}
        deployment: prod
        generate_test_summary: false

    run-tests311:
      name: Run Tests (py 3.11)
      secrets: inherit
      uses: ./.github/workflows/test.yml
      with:
        precommit_scope: "NO_CODEGEN" # Codegen is python version-specific, we test it only on py3.10
        enable_compile_tests: false
        python_version: "3.11"
        models: ${{ inputs.models || 'pytorch' }}
        deployment: prod
        generate_test_summary: false

    run-tests312:
      name: Run Tests (py 3.12)
      secrets: inherit
      uses: ./.github/workflows/test.yml
      with:
        precommit_scope: "NO_CODEGEN" # Codegen is python version-specific, we test it only on py3.10
        enable_compile_tests: false
        python_version: "3.12"
        models: ${{ inputs.models || 'pytorch' }}
        deployment: prod
        generate_test_summary: false

    run-tests313:
      name: Run Tests (py 3.13)
      secrets: inherit
      uses: ./.github/workflows/test.yml
      with:
        precommit_scope: "NO_CODEGEN" # Codegen is python version-specific, we test it only on py3.10
        enable_compile_tests: false
        python_version: "3.13"
        models: ${{ inputs.models || 'pytorch' }}
        deployment: prod
        generate_test_summary: false

    generate_test_summary:
      name: Generate Combined Test Summary
      needs: [run-tests310, run-tests311, run-tests312, run-tests313, scorecard-integration-test, run-sync-public-website]
      if: ${{ always() }}
      runs-on: [tetra-ubuntu-2204, self-hosted]
      env:
        VENV_PATH: build/ci-envs/qaihm-build
      steps:
        - uses: actions/checkout@v6

        - name: CI Setup
          uses: ./.github/actions/ci-setup
          with:
            sudo-password: ${{ secrets.TETRASERVICE_PASSWORD }}
            venv-path: ${{ env.VENV_PATH }}

        - name: Download py3.10 Test Results
          uses: actions/download-artifact@v8
          continue-on-error: true
          with:
            name: test-results-py3.10
            path: build/all-test-results/py310

        - name: Download py3.11 Test Results
          uses: actions/download-artifact@v8
          continue-on-error: true
          with:
            name: test-results-py3.11
            path: build/all-test-results/py311

        - name: Download py3.12 Test Results
          uses: actions/download-artifact@v8
          continue-on-error: true
          with:
            name: test-results-py3.12
            path: build/all-test-results/py312

        - name: Download py3.13 Test Results
          uses: actions/download-artifact@v8
          continue-on-error: true
          with:
            name: test-results-py3.13
            path: build/all-test-results/py313

        - name: Download Scorecard Integration Test Results
          uses: actions/download-artifact@v8
          continue-on-error: true
          with:
            name: test-results-scorecard-integration
            path: build/all-test-results/scorecard

        - name: Generate Test Summary
          env:
            GH_TOKEN: ${{ github.token }}
          run: |
            source "${{ env.VENV_PATH }}/bin/activate"
            mkdir -p build/combined-test-results

            # Build failure arguments from failed workflow jobs
            FAILURE_ARGS=()
            while IFS=$'\t' read -r name url; do
              FAILURE_ARGS+=("--workflow-failure" "$name" "--workflow-failure-url" "$url")
            done < <(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --paginate -q '.jobs[] | select(.conclusion == "failure") | "\(.name)\t${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/\(.id)"')

            python -m qai_hub_models.scripts.generate_test_summary \
              --title "Nightly Test" \
              "${FAILURE_ARGS[@]}" \
              --name "py3.10 QAIHM Tests" --junit-xml build/all-test-results/py310/qaihm-unit-tests-junit.xml \
              --name "py3.10 CLI Tests" --junit-xml build/all-test-results/py310/qaihm-cli-tests-junit.xml \
              --name "py3.10 Model Tests" --junit-xml build/all-test-results/py310/qaihm-model-tests-junit.xml \
              --name "py3.10 Verify Workbench Jobs" --junit-xml build/all-test-results/py310/qaihm-verify-workbench-jobs-junit.xml \
              --name "py3.11 QAIHM Tests" --junit-xml build/all-test-results/py311/qaihm-unit-tests-junit.xml \
              --name "py3.11 CLI Tests" --junit-xml build/all-test-results/py311/qaihm-cli-tests-junit.xml \
              --name "py3.11 Model Tests" --junit-xml build/all-test-results/py311/qaihm-model-tests-junit.xml \
              --name "py3.12 QAIHM Tests" --junit-xml build/all-test-results/py312/qaihm-unit-tests-junit.xml \
              --name "py3.12 CLI Tests" --junit-xml build/all-test-results/py312/qaihm-cli-tests-junit.xml \
              --name "py3.12 Model Tests" --junit-xml build/all-test-results/py312/qaihm-model-tests-junit.xml \
              --name "py3.13 QAIHM Tests" --junit-xml build/all-test-results/py313/qaihm-unit-tests-junit.xml \
              --name "py3.13 CLI Tests" --junit-xml build/all-test-results/py313/qaihm-cli-tests-junit.xml \
              --name "py3.13 Model Tests" --junit-xml build/all-test-results/py313/qaihm-model-tests-junit.xml \
              --name "Scorecard Job Submission" --junit-xml build/all-test-results/scorecard/qaihm-model-tests-junit.xml \
              --name "Scorecard Accuracy Collection" --junit-xml build/all-test-results/scorecard/qaihm-device-accuracy-tests-junit.xml \
              --name "Scorecard Export Tests" --junit-xml build/all-test-results/scorecard/qaihm-export-zip-tests-junit.xml \
              --name "Scorecard Integration Test" --junit-xml build/all-test-results/scorecard/qaihm-scorecard-integration-test-junit.xml \
              --output build/combined-test-results/summary.md

        - name: Copy Test Results to Combined Directory
          run: |
            mkdir -p build/combined-test-results
            if [ -d build/all-test-results ]; then
              for dir in build/all-test-results/*/; do
                [ -d "$dir" ] || continue
                prefix=$(basename "$dir")
                for f in "$dir"*.xml "$dir"*.json; do
                  if [ -f "$f" ]; then
                    cp "$f" "build/combined-test-results/${prefix}-$(basename "$f")"
                  fi
                done
              done
            fi

        - name: Upload Combined Test Results
          uses: actions/upload-artifact@v7
          with:
            name: nightly-test-results
            path: build/combined-test-results

        - name: Delete Individual Test Results
          env:
            GH_TOKEN: ${{ github.token }}
          run: |
            for version in 3.10 3.11 3.12 3.13; do
              gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name == \"test-results-py${version}\") | .id" | while read artifact_id; do
                echo "Deleting artifact $artifact_id"
                gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
              done
            done
            # Delete scorecard integration test results
            gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts --paginate -q ".artifacts[] | select(.name == \"test-results-scorecard-integration\") | .id" | while read artifact_id; do
              echo "Deleting artifact $artifact_id"
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id || true
            done

    run-sync-public-website:
     name: Sync Performance Data with Public Website
     secrets: inherit
     if: ${{ github.event_name == 'schedule' || inputs.run_website_test }}
     uses: ./.github/workflows/release_website.yml
     with:
       source_branch_name: ${{ github.ref_name }}
       import_mode: no-verify-urls

    scorecard-integration-test:
      name: Scorecard Integration Test
      secrets: inherit
      if: ${{ github.event_name == 'schedule' || inputs.run_sc_integration_test }}
      uses: ./.github/workflows/scorecard_integration_test.yml
      with:
        generate_test_summary: false

    notify_failure:
        if: ${{ failure() && github.event_name == 'schedule' }}
        name: Notify Failure
        needs: [run-tests310, run-tests311, run-tests312, run-tests313, scorecard-integration-test, run-sync-public-website, generate_test_summary]
        runs-on: [tetra-ubuntu-2204, self-hosted]
        outputs:
            issue_urls: ${{ steps.create-github-issues.outputs.issue_urls }}
        permissions:
            contents: read
            issues: write
            actions: read
        env:
            GH_TOKEN: ${{ secrets.STAGING_GH_TOKEN }}
            VENV_PATH: build/ci-envs/qaihm-notify

        steps:
        - uses: actions/checkout@v6

        - name: CI Setup
          id: ci_setup
          uses: ./.github/actions/ci-setup
          with:
            venv-path: ${{ env.VENV_PATH }}

        - name: Download Combined Test Results
          id: download-test-results
          uses: actions/download-artifact@v8
          continue-on-error: true
          with:
            name: nightly-test-results
            path: build/nightly-test-results

        - name: Generate Issue Bodies
          id: generate-issues
          run: |
            source "${{ env.VENV_PATH }}/bin/activate"

            # Build failure arguments from failed workflow jobs (same pattern as generate_test_summary)
            FAILURE_ARGS=()
            while IFS=$'\t' read -r name url; do
              FAILURE_ARGS+=("--workflow-failure" "$name" "--workflow-failure-url" "$url")
            done < <(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs --paginate -q '.jobs[] | select(.conclusion == "failure") | "\(.name)\t${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/job/\(.id)"')

            python -m qai_hub_models.scripts.notify_nightly_failures \
              "${FAILURE_ARGS[@]}" \
              --output-dir build/nightly-issues \
              --repository "${{ github.repository }}" \
              --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}" \
              --ref-name "${{ github.ref_name }}" \
              --failed-jobs-json "build/nightly-test-results/py310-failed-workbench-jobs.json"

        - name: Create GitHub Issues
          id: create-github-issues
          run: |
            ISSUE_URLS=""

            if [ -f build/nightly-issues/workbench_issue.md ]; then
              URL=$(gh issue create \
                --repo qcom-ai-hub/tetracode \
                --title "$(cat build/nightly-issues/workbench_title.txt)" \
                --body-file build/nightly-issues/workbench_issue.md \
                --label p0 --label ai-hub-models)
              echo "Created workbench issue: $URL"
              ISSUE_URLS="$URL"
            fi

            if [ -f build/nightly-issues/general_issue.md ]; then
              URL=$(gh issue create \
                --repo qcom-ai-hub/tetracode \
                --title "$(cat build/nightly-issues/general_title.txt)" \
                --body-file build/nightly-issues/general_issue.md \
                --label p0 --label ai-hub-models)
              echo "Created general issue: $URL"
              ISSUE_URLS="${ISSUE_URLS:+$ISSUE_URLS$'\n'}$URL"
            fi

            # Write URLs to GITHUB_OUTPUT for Slack step
            # Use single-line format with literal \n to avoid breaking YAML
            # block scalars when substituted into the Slack payload.
            echo "issue_urls=${ISSUE_URLS//$'\n'/\\n}" >> "$GITHUB_OUTPUT"

        - name: Send Slack Notification
          id: slack_notification
          uses: slackapi/slack-github-action@v3
          with:
            method: chat.postMessage
            token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
            payload: |
              channel: "C05LEEK0N8J"
              text: "🚨 QAI Hub Models Nightly Failed\n\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}\n\nGitHub Issues:\n${{ steps.create-github-issues.outputs.issue_urls }}"

    breeze-nightly-analysis:
      name: AI Nightly Failure Analysis
      needs: [generate_test_summary, notify_failure]
      if: ${{ failure() && github.event_name == 'schedule' }}
      uses: qcom-eng-Nimbus/custom-templates/.github/workflows/breeze-agent-reusable.yaml@main
      secrets: inherit
      with:
        agent_name: "nightly-analyst"
        claude_model: "us.anthropic.claude-opus-4-6-v1"
        github_token_scope: organization
        base_allowed_tools: >-
          Read,
          Bash(gh:*),
          Bash(cat:*),
          Bash(git:*),
          Bash(python3:*),
          Bash(find:*),
          Bash(ls:*),
          Bash(head:*),
          Bash(tail:*),
          Bash(wc:*),
          Bash(grep:*),
          Bash(mkdir:*)
        prompt: |
          The QAI Hub Models nightly tests have failed. Analyze the failures and post findings.

          Read .claude/skills/nightly-analyze/SKILL.md and follow its process exactly.

          Context variables for the skill:
          - RUN_ID: ${{ github.run_id }}
          - REPO: ${{ github.repository }}
          - RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - ISSUE_URLS: ${{ needs.notify_failure.outputs.issue_urls }}
        system_prompt: |
          You are Breeze AI, a nightly CI failure analyst for QAI Hub Models.
          Your job: analyze test failures, find breaking commits, propose fixes,
          and soft-triage to the right team. You NEVER auto-assign or auto-label.

          IMPORTANT: You have a 40-turn limit. Be efficient:
          - Read SKILL.md first — it contains ALL instructions including triage rules
          - Do NOT read .claude/triage/ files separately — triage info is inlined in SKILL.md
          - Batch gh API calls — never loop over commits one-by-one
          - Target: finish in under 25 turns

          Environment:
          - RUN_ID: ${{ github.run_id }}
          - REPO: ${{ github.repository }}
          - RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - ISSUE_URLS: ${{ needs.notify_failure.outputs.issue_urls }}
          - Full gh CLI access (authenticated) and complete repo checkout
          - Test results artifact: "nightly-test-results"
          - Issues filed in qcom-ai-hub/tetracode with labels p0, ai-hub-models
          - Issue title pattern: "[QAIHM Nightly] Test Failures - YYYY-MM-DD" or "[QAIHM Nightly] Workbench Job Failures - YYYY-MM-DD"
        bot_name: "breeze-code-action[bot]"
        max_turns: 40
        track_progress: false
        show_full_output: true
        additional_permissions: "actions: read"
        sub_category: "nightly-analysis"
