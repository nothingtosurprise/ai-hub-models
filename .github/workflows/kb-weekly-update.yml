##
## Weekly Triage Knowledge Base Update
##
## Runs every Sunday at 9am UTC (2am PST).
## A Breeze agent reviews resolved nightly and scorecard issues from the past week,
## evaluates triage accuracy for both, and opens a PR updating .claude/triage/ files.
##

name: Weekly KB Update

on:
    schedule:
        - cron: '0 9 * * 0'  # Every Sunday at 9am UTC (2am PST)

    workflow_dispatch:
      inputs:
        lookback_days:
          description: Number of days to look back for resolved issues
          required: false
          type: number
          default: 7

jobs:
    kb-weekly-update:
      name: Triage KB Weekly Update
      uses: qcom-eng-Nimbus/custom-templates/.github/workflows/breeze-agent-reusable.yaml@main
      secrets: inherit
      with:
        agent_name: "kb-weekly-update"
        claude_model: "us.anthropic.claude-opus-4-6-v1"
        github_token_scope: organization
        base_allowed_tools: >-
          Read,
          Write,
          Edit,
          Bash(gh:*),
          Bash(git:*),
          Bash(cat:*),
          Bash(grep:*),
          Bash(find:*),
          Bash(ls:*),
          Bash(head:*),
          Bash(tail:*),
          Bash(wc:*),
          Bash(mkdir:*),
          Bash(date:*),
          mcp__github_file_ops__commit_files
        prompt: |
          Review resolved nightly and scorecard issues from the past week, evaluate
          triage accuracy for both, and propose updates to the triage knowledge base
          via a PR.

          Read .claude/skills/kb-weekly-update/SKILL.md and follow its process exactly.

          Context variables for the skill:
          - REPO: ${{ github.repository }}
          - TETRACODE_REPO: qcom-ai-hub/tetracode
          - LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
        system_prompt: |
          You are Breeze AI, a triage knowledge base maintainer for QAI Hub Models.
          Your job: review how nightly failure triage AND scorecard regression triage
          performed this past week, identify improvements, and open a PR with knowledge
          base updates for human review.

          IMPORTANT: You have a 50-turn limit. Be efficient:
          - Read SKILL.md first — it contains ALL instructions
          - Batch gh API calls — never loop over issues one-by-one
          - NEVER auto-merge — always create a PR for human review
          - NEVER delete existing knowledge base entries without strong evidence
          - Flag low-confidence updates clearly

          Environment:
          - REPO: ${{ github.repository }}
          - TETRACODE_REPO: qcom-ai-hub/tetracode
          - LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
          - Full gh CLI access (authenticated) and complete repo checkout
          - Write access to create branches and PRs on ${{ github.repository }}
        bot_name: "breeze-code-action[bot]"
        max_turns: 50
        track_progress: false
        show_full_output: true
        additional_permissions: "contents: write, pull-requests: write, actions: read"
        sub_category: "kb-weekly-update"

    notify-czar:
      name: Notify Czar of KB Update PR
      needs: [kb-weekly-update]
      if: always()
      runs-on: [tetra-ubuntu-2204, self-hosted]
      steps:
        - name: Send Slack Notification
          uses: slackapi/slack-github-action@v3
          with:
            method: chat.postMessage
            token: ${{ secrets.SLACK_NOTIFIER_TOKEN }}
            payload: |
              channel: "C05LEEK0N8J"
              text: "📚 Weekly Triage KB Update PR created — nightly + scorecard czars please review.\n\nWorkflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
