# Breeze AI Configuration

agents:
  # Breeze-AI General Agent
  breeze-ai:
    enabled: true
    # load_local_kb:
    #   enabled: true
    #   domains:
    #     - edgewise

  # Nightly Failure Analysis Agent
  nightly-analyst:
    enabled: true
    custom_instructions: |
      You analyze nightly CI failures for QAI Hub Models.
      Follow .claude/skills/nightly-analyze/SKILL.md exactly.
      Use .claude/triage/ knowledge base for error pattern recognition and team routing.
      Post findings as a structured comment on the auto-filed GitHub issue in qcom-ai-hub/tetracode.
      IMPORTANT: Soft recommendations only — never auto-assign or auto-label issues.
      IMPORTANT: Never hardcode a czar name — the czar rotates weekly.

  # Weekly Knowledge Base Update Agent
  kb-weekly-update:
    enabled: true
    custom_instructions: |
      You maintain the triage knowledge base for QAI Hub Models nightly CI.
      Follow .claude/skills/kb-weekly-update/SKILL.md exactly.
      Review resolved nightly issues, evaluate triage accuracy, and open a PR
      with knowledge base updates to .claude/triage/ files.
      IMPORTANT: NEVER remove existing error patterns or team entries from .claude/triage/ files — only add or modify.
      IMPORTANT: Flag low-confidence updates with "(low confidence — verify)".

  # Scorecard Regression Analysis Agent
  scorecard-analysis:
    enabled: true
    custom_instructions: |
      You analyze scorecard performance and numerics regressions for QAI Hub Models.
      Follow .claude/skills/scorecard-analyze/SKILL.md exactly.
      Use .claude/triage/ knowledge base for pattern recognition and team routing.
      Post findings as a structured comment on the regression issue in qcom-ai-hub/tetracode.
      IMPORTANT: Soft recommendations only — never auto-assign or auto-label issues.
      IMPORTANT: Analyze BOTH perf regressions (2x+ slowdown) AND numerics regressions (accuracy drift).

  # PR Review Agent
  pr-review:
    enabled: true

    # # Load local knowledge base
    # load_local_kb:
    #   enabled: true
    #   domains:
    #     - domain-1

    # # MCP servers (Model Context Protocol)
    # # Only whitelisted servers from configure-mcps/mcp-whitelist.yaml are allowed
    # mcps:
    #   - sequential-thinking

    # # Allowed tools for MCP servers
    # # Must use full format: mcp__server-name__tool_name
    # # Only tools from whitelisted servers are allowed
    # allowed_tools:
    #   - mcp__sequential-thinking__sequentialthinking

    # Custom instructions specific to this project
    # by default, Breeze AI uses general instructions suitable for most simple projects
    # for advanced use cases, you should use custom instructions and plugins
    custom_instructions: |
      Code review focus:
      - Code maintainability and readability
      - Security vulnerabilities
      - Performance bottlenecks
      - Best practices adherence
      - Code style consistency
      - Potential bugs and edge cases
      - Test coverage and quality
      - Documentation completeness

    # # Breeze Code plugins (simple string format: "name@marketplace")
    # # These will be merged with default plugins from the workflow
    # # Plugins are advanced tools that extend Breeze AI capabilities
    # plugins:
    #   - "demo-pr-reviewer@breeze-claude-plugins"
