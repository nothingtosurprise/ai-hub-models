metrics:
- dataset_name: coco_keypoints
  dataset_link: https://cocodataset.org/
  dataset_split_description: val2017 split - images with at least one person keypoint annotation
  metric_name: Mean Average Precision
  metric_description: Mean Average Precision (across predicted classes).
  metric_unit: mAP
  metric_range:
    min: 0.0
    max: 100.0
  metric_enablement_threshold: 10.0
  num_partial_samples: 300
  partial_torch_metric: 56.3
  device_metric:
    Samsung Galaxy S25:
      w8a16:
        qnn_dlc:
          partial_metric: 56.3
        onnx:
          partial_metric: 56.2
      float:
        tflite:
          partial_metric: 56.2
        qnn_dlc:
          partial_metric: 56.2
        onnx:
          partial_metric: 56.2
