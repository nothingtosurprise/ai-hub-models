metrics:
- dataset_name: coco_panoptic_segmentation
  dataset_link: https://cocodataset.org/#home
  dataset_split_description: val2017 split
  metric_name: Panoptic Quality
  metric_description: A measure of how well all objects in the image were correctly identified and segmented.
  metric_unit: PQ
  metric_range:
    min: 0.0
    max: 1.0
  metric_enablement_threshold: 0.1
  num_partial_samples: 100
  partial_torch_metric: 0.423
  device_metric:
    Samsung Galaxy S25:
      float:
        qnn_context_binary:
          partial_metric: 0.419
        precompiled_qnn_onnx:
          partial_metric: 0.419
