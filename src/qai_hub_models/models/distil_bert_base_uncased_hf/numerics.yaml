metrics:
- dataset_name: wikitext_masked_distilbert_distilbert_base_uncased
  dataset_link: https://huggingface.co/datasets/wikitext
  dataset_split_description: wikitext-2-raw-v1 validation split
  metric_name: Top-1 Accuracy
  metric_description: Percentage of masked tokens correctly predicted (highest-probability token).
  metric_unit: '%'
  metric_range:
    min: 0.0
    max: 100.0
  metric_enablement_threshold: 10.0
  num_partial_samples: 250
  partial_torch_metric: 60.0
  device_metric:
    Samsung Galaxy S25:
      w8a16:
        qnn_dlc:
          partial_metric: 60.0
        onnx:
          partial_metric: 60.0
      float:
        tflite:
          partial_metric: 60.0
        qnn_dlc:
          partial_metric: 60.0
