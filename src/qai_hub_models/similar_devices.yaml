# Maps unsupported devices to similar (supported) AI Hub devices.
#
# Each device has two chipset fields:
#   * chipset: the real chipset for this device; this is what gets added to
#     `supported_chipsets` in perf.yaml.
#   * reference_chipset: the chipset whose perf numbers are duplicated onto
#     this device. If unset, falls back to chipset.
#
# Lookup uses the reference_chipset field (or chipset if unset), plus any
# chipset that normalizes to the same value via sanitize_chipset_name
# (e.g. 8-elite-for-galaxy -> 8-elite).
devices:
  Dragonwing IQ-8275 EVK:
    chipset: qualcomm-qcs8275
    reference_chipset: qualcomm-sa7255p
